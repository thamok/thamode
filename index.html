<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thamo Köper</title>
    <style>
        @font-face {
            font-family: 'Monaspace Neon';
            src: url('https://cdn.jsdelivr.net/gh/githubnext/monaspace@v1.000/fonts/otf/MonaspaceNeon-Regular.otf');
            font-weight: normal;
        }
        @font-face {
            font-family: 'Monaspace Radon';
            src: url('https://cdn.jsdelivr.net/gh/githubnext/monaspace@v1.000/fonts/otf/MonaspaceRadon-Regular.otf');
            font-weight: normal;
        }
        :root {
            --bg: #030303;
            --text: #ffffff;
            --accent: #3a86ff;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Monaspace Neon', monospace;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            image-rendering: pixelated;
        }
        .content {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10vw;
        }
        .ui-box {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
        }
        .tag {
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 0.75rem;
            display: block;
        }
        h2 {
            font-family: 'Monaspace Radon', monospace;
            font-size: clamp(2rem, 5vw, 3.2rem);
            margin: 0 0 1.5rem 0;
            font-weight: normal;
            letter-spacing: -0.02em;
            color: #fff;
        }
        .about-text {
            line-height: 1.8;
            opacity: 0.75;
            margin-bottom: 2.5rem;
            font-size: 1rem;
            max-width: 280px; /* Forces the break naturally while remaining responsive */
        }
        .nav {
            display: flex;
            gap: 2rem;
            pointer-events: auto;
        }
        .nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 4px;
            transition: all 0.3s ease;
        }
        .nav a:hover {
            border-color: var(--text);
            opacity: 1;
            transform: translateY(-1px);
        }
        .stats {
            position: fixed;
            bottom: 25px;
            right: 30px;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            opacity: 0.25;
            pointer-events: none;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .content { padding: 0 5vw; }
            .ui-box { padding: 1.5rem; width: 85%; }
            .about-text { max-width: 100%; }
        }
    </style>
</head>
<body>
    <canvas id="pretext-canvas"></canvas>
    <div class="content">
        <div class="ui-box">
            <span class="tag">System Architect &amp; Security Research</span>
            <h2>Thamo A. Köper</h2>
            <p class="about-text">
                I like Salesforce and Apple.<br>
                And make them do amazing things. 
            </p>
            <div class="nav">
                <a href="https://github.com/thamok" target="_blank">GITHUB</a>
                <a href="mailto:contact@thamo.de">CONTACT</a>
            </div>
        </div>
    </div>
    <div class="stats">Berlin 👾 2026</div>
    <script>
        const canvas = document.getElementById('pretext-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const RESOLUTION = 4;
        let width, height, cols, rows;
        let density, velocityX, velocityY, prevDensity;
        let mouse = { x: 0, y: 0, px: 0, py: 0, active: false };
        let rotation = 0;

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            cols = Math.ceil(width / RESOLUTION);
            rows = Math.ceil(height / RESOLUTION);
            density = new Float32Array(cols * rows);
            prevDensity = new Float32Array(cols * rows);
            velocityX = new Float32Array(cols * rows);
            velocityY = new Float32Array(cols * rows);
            ctx.fillStyle = '#030303';
            ctx.fillRect(0, 0, width, height);
        }

        window.addEventListener('resize', init);
        init();

        const handleInput = (x, y) => {
            mouse.px = mouse.x;
            mouse.py = mouse.y;
            mouse.x = x;
            mouse.y = y;
            const i = Math.floor(x / RESOLUTION);
            const j = Math.floor(y / RESOLUTION);
            if (i > 0 && i < cols - 1 && j > 0 && j < rows - 1) {
                const idx = j * cols + i;
                density[idx] += 25;
                velocityX[idx] += (mouse.x - mouse.px) * 0.5;
                velocityY[idx] += (mouse.y - mouse.py) * 0.5;
            }
        };

        window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
        window.addEventListener('touchmove', e => {
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
            e.preventDefault();
        }, { passive: false });

        function drawSpinningT(time) {
            rotation += 0.008;
            const centerX = width * 0.75;
            const centerY = height * 0.45;
            const size = Math.min(width, height) * 0.12;
            
            for (let a = -1; a <= 1; a += 0.15) {
                const tx1 = centerX + (a * size) * Math.cos(rotation) - (size/2) * Math.sin(rotation);
                const ty1 = centerY + (a * size) * Math.sin(rotation) + (size/2) * Math.cos(rotation);
                injectForce(tx1, ty1, Math.cos(rotation) * 1.5, Math.sin(rotation) * 1.5);

                const tx2 = centerX + (0) * Math.cos(rotation) - (a * size/2) * Math.sin(rotation);
                const ty2 = centerY + (0) * Math.sin(rotation) + (a * size/2) * Math.cos(rotation);
                injectForce(tx2, ty2, -Math.sin(rotation) * 1.5, Math.cos(rotation) * 1.5);
            }
        }

        function injectForce(x, y, vx, vy) {
            const i = Math.floor(x / RESOLUTION);
            const j = Math.floor(y / RESOLUTION);
            if (i > 0 && i < cols - 1 && j > 0 && j < rows - 1) {
                const idx = j * cols + i;
                density[idx] = Math.min(100, density[idx] + 1.5);
                velocityX[idx] += vx;
                velocityY[idx] += vy;
            }
        }

        function step() {
            prevDensity.set(density);
            for (let j = 1; j < rows - 1; j++) {
                for (let i = 1; i < cols - 1; i++) {
                    const idx = j * cols + i;
                    density[idx] *= 0.982;
                    velocityX[idx] *= 0.975;
                    velocityY[idx] *= 0.975;
                    
                    const vx = velocityX[idx];
                    const vy = velocityY[idx];
                    if (Math.abs(vx) > 0.01 || Math.abs(vy) > 0.01) {
                        const srcI = Math.max(0, Math.min(cols - 1, i - vx));
                        const srcJ = Math.max(0, Math.min(rows - 1, j - vy));
                        const srcIdx = Math.floor(srcJ) * cols + Math.floor(srcI);
                        density[idx] = prevDensity[srcIdx] * 0.99;
                    }
                }
            }
        }

        function render() {
            ctx.fillStyle = '#030303';
            ctx.fillRect(0, 0, width, height);
            
            for (let j = 0; j < rows; j++) {
                for (let i = 0; i < cols; i++) {
                    const d = density[j * cols + i];
                    if (d < 0.1) continue;
                    const b = Math.min(255, d * 18);
                    ctx.fillStyle = `rgb(${b * 0.2},${b * 0.4},${b})`;
                    ctx.fillRect(i * RESOLUTION, j * RESOLUTION, RESOLUTION, RESOLUTION);
                }
            }

            for(let k = 0; k < 600; k++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.04})`;
                ctx.fillRect(Math.random() * width, Math.random() * height, 1, 1);
            }
        }

        function frame(time) {
            drawSpinningT(time);
            step();
            render();
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
